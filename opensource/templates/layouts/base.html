<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7ff;
            --card: #ffffff;
            --text: #1d2748;
            --muted: #5f6f99;
            --primary: #4f6df5;
            --accent: #0ea5a0;
            --line: #d7e1fb;
            --glow: rgba(79, 109, 245, 0.22);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 20% 10%, #eaf0ff, var(--bg) 45%),
                        linear-gradient(120deg, #f9fbff, #eef3ff);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            width: min(1100px, 92%);
            margin: 0 auto;
        }

        header {
            padding: 26px 0;
            border-bottom: 1px solid var(--line);
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .brand span {
            color: var(--accent);
        }

        .nav ul {
            list-style: none;
            display: flex;
            gap: 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .hero {
            padding: 72px 0 54px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 36px;
            align-items: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 4.8vw, 3.25rem);
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .hero p {
            color: var(--muted);
            max-width: 60ch;
            margin-bottom: 24px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 600;
            cursor: default;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8d6bff);
            color: white;
            box-shadow: 0 8px 24px var(--glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .hero-card {
            background: linear-gradient(180deg, #ffffff, #f7faff);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 14px 34px rgba(60, 89, 170, 0.12);
        }

        .hero-card h3 {
            margin-bottom: 12px;
            color: #314174;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .metric {
            background: #f7f9ff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }

        .metric strong {
            display: block;
            font-size: 1.15rem;
            color: var(--accent);
        }

        section.features {
            padding: 12px 0 72px;
        }

        .section-title {
            margin-bottom: 18px;
        }

        .section-title h2 {
            font-size: 1.75rem;
            margin-bottom: 6px;
        }

        .section-title p {
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .feature-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            background: #ffffff;
        }

        .feature-card h3 {
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .feature-card p {
            color: var(--muted);
            font-size: 0.96rem;
        }

        .table-section {
            margin-top: 36px;
            margin-bottom: 12px;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow-x: auto;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 520px;
        }

        thead {
            background: rgba(107, 124, 255, 0.16);
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }

        th {
            font-size: 0.95rem;
            letter-spacing: 0.2px;
        }

        td {
            color: var(--muted);
        }

        tbody tr:hover {
            background: #f5f8ff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        footer {
            border-top: 1px solid var(--line);
            padding: 22px 0 30px;
            color: var(--muted);
            font-size: 0.92rem;
            text-align: center;
        }

        @media (max-width: 860px) {
            .hero {
                grid-template-columns: 1fr;
                padding-top: 52px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .nav ul {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav">
            <div class="brand">Student<span>Hub</span></div>
            <ul>
                <li>Home</li>
                <li>Programs</li>
                <li>Departments</li>
                <li>Contact</li>
            </ul>
        </div>
    </header>

    <main class="container">
        {% block content %}

        {% endblock %}
    </main>
    <div style="background-color: #f8faff; color: var(--text)">
         {% block body %}

        {% endblock %}
    </div>
    <footer>
        Crafted for the StudentHub demo | Built with HTML and CSS
    </footer>
</body>
</html>
