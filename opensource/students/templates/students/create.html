{% extends 'layouts/base.html'%}

{% block title %}Create Student{% endblock %}

{% block content %}
<style>
    .create-wrapper {
        padding: 42px 0 60px;
        display: flex;
        justify-content: center;
    }

    .create-card {
        width: min(620px, 100%);
        background: linear-gradient(180deg, #ffffff, #f7faff);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 26px;
        box-shadow: 0 14px 34px rgba(60, 89, 170, 0.12);
    }

    .create-card h1 {
        font-size: clamp(1.6rem, 3.5vw, 2rem);
        margin-bottom: 8px;
    }

    .subtitle {
        color: var(--muted);
        margin-bottom: 20px;
    }

    form p {
        margin-bottom: 12px;
    }

    form ul {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    form input,
    form select,
    form textarea {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
    }

    .errorlist {
        margin: 8px 0 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #fecaca;
        background: #fff1f2;
        color: #b91c1c;
        font-size: 0.92rem;
    }

    .errorlist li + li {
        margin-top: 4px;
    }

    .helptext {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 0.86rem;
    }

    input[aria-invalid="true"],
    select[aria-invalid="true"],
    textarea[aria-invalid="true"] {
        border-color: #f87171;
        background: #fffafb;
    }

    .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        border: none;
        border-radius: 10px;
        padding: 11px 16px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary), #8d6bff);
        color: #fff;
        box-shadow: 0 8px 24px var(--glow);
    }

    .btn-ghost {
        border: 1px solid var(--line);
        color: var(--text);
        background: transparent;
    }
</style>

<section class="create-wrapper">
    <div class="create-card">
        <h1>Create New Student</h1>
        <p class="subtitle">Fill the form below to add a new student record.</p>
        <form method="POST">
            {% csrf_token %}
            {{form}}
            <div class="actions">
                <input class="btn btn-primary" type="submit" value="Save Student">
                <a class="btn btn-ghost" href="/students/">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
